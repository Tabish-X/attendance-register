<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attendify - Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
body { background: var(--bg); }

/* Hide auth root until we know user is not logged in — prevents flash */
.auth-root { display: none; animation: fadeIn 0.25s ease; }
.auth-root.visible { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.verify-box {
  text-align: center; padding: 20px 0;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.verify-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent-light);
  display: flex; align-items: center; justify-content: center;
}
.verify-icon svg { color: var(--accent); }

.auth-form { gap: 12px; }
.auth-switch { margin-top: 0; }
</style>
</head>
<body>

<div class="auth-root" id="authRoot">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>Attendify</h1>
      <p>Attendance management for classes</p>
    </div>

    <!-- ROW 1: Teacher / Student -->
    <div class="role-tabs mb-3">
      <button class="role-tab active" id="roleTeacher" onclick="setRole('teacher')">Teacher</button>
      <button class="role-tab" id="roleStudent" onclick="setRole('student')">Student</button>
    </div>

    <!-- ROW 2: Sign In / Sign Up (with gap above, no negative margin) -->
    <div class="role-tabs mb-4">
      <button class="role-tab active" id="tabLogin" onclick="setMode('login')">Sign In</button>
      <button class="role-tab" id="tabSignup" onclick="setMode('signup')">Sign Up</button>
    </div>

    <!-- ALERT -->
    <div id="alertBox" style="display:none; margin-bottom: 12px;"></div>

    <!-- ===== LOGIN FORM ===== -->
    <div id="formLogin" class="auth-form">
      <div class="input-group">
        <label>Email address</label>
        <input class="field" type="email" id="loginEmail" placeholder="Your email" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <input class="has-eye" type="password" id="loginPassword" placeholder="Your password" />
          <button class="eye-btn" type="button" onclick="toggleEye('loginPassword', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign In</button>
      <div class="auth-switch">
        Forgot password? <a href="#" onclick="setMode('reset')">Reset here</a>
      </div>
    </div>

    <!-- ===== SIGNUP FORM ===== -->
    <div id="formSignup" class="auth-form" style="display:none;">
      <div class="input-group">
        <label>Full name</label>
        <input class="field" type="text" id="signupName" placeholder="Your name" />
      </div>
      <div class="input-group">
        <label>Email address</label>
        <input class="field" type="email" id="signupEmail" placeholder="Your email" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <input class="has-eye" type="password" id="signupPassword" placeholder="Set a password" />
          <button class="eye-btn" type="button" onclick="toggleEye('signupPassword', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <!-- Teacher signup code — only shown when Teacher role is selected -->
      <div class="input-group" id="teacherCodeGroup" style="display:none;">
        <label>Teacher Access Code</label>
        <div class="input-wrap">
          <input class="has-eye" type="password" id="teacherCode" placeholder="Enter the code given by admin" />
          <button class="eye-btn" type="button" onclick="toggleEye('teacherCode', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="handleSignup()">Create Account</button>
      <div class="auth-switch">
        Already have an account? <a href="#" onclick="setMode('login')">Sign in</a>
      </div>
    </div>

    <!-- ===== RESET FORM ===== -->
    <div id="formReset" class="auth-form" style="display:none;">
      <div class="input-group">
        <label>Email address</label>
        <input class="field" type="email" id="resetEmail" placeholder="Your email" />
      </div>
      <button class="btn btn-primary btn-full" onclick="handleReset()">Send Reset Link</button>
      <div class="auth-switch">
        Remember password? <a href="#" onclick="setMode('login')">Sign in</a>
      </div>
    </div>

    <!-- ===== VERIFY EMAIL STATE ===== -->
    <div id="formVerify" style="display:none;">
      <div class="verify-box">
        <div class="verify-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <h3>Check your email</h3>
        <p class="text-sm text-muted">A verification link has been sent to your email. Please verify, then sign in.</p>
        <button class="btn btn-secondary" onclick="setMode('login')">Back to Sign In</button>
      </div>
    </div>

  </div>
</div>

<!-- Full-screen spinner shown while checking auth state -->
<div class="loading-overlay show" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<script type="module">
import {
  auth,
  loginUser, resetPassword, sendVerificationEmail,
  onAuthStateChanged
} from "./firebase.js";
import { signupUser, loginCheck } from "./api.js";

// Hide loading spinner and show auth form only after we confirm user is NOT logged in
onAuthStateChanged(auth, async (user) => {
  if (user && user.emailVerified) {
    try {
      const data = await loginCheck();
      localStorage.setItem("userProfile", JSON.stringify(data));
      if (data.role === "teacher") { window.location.href = "/teacher"; return; }
      if (data.role === "student") { window.location.href = "/student"; return; }
    } catch(_) {}
  }
  // Not logged in — show the auth form
  document.getElementById("loadingOverlay").classList.remove("show");
  document.getElementById("authRoot").classList.add("visible");
});

let currentRole = "teacher";

window.setRole = function(role) {
  currentRole = role;
  document.getElementById("roleTeacher").classList.toggle("active", role === "teacher");
  document.getElementById("roleStudent").classList.toggle("active", role === "student");
  // Show teacher code field only when Teacher + Signup
  const mode = document.getElementById("formSignup").style.display !== "none" ? "signup" : "other";
  document.getElementById("teacherCodeGroup").style.display =
    (role === "teacher" && mode === "signup") ? "flex" : "none";
  clearAlert();
};

window.setMode = function(mode) {
  ["Login","Signup","Reset","Verify"].forEach(m => {
    document.getElementById(`form${m}`).style.display = "none";
  });
  document.getElementById(`form${mode.charAt(0).toUpperCase()+mode.slice(1)}`).style.display = "flex";
  // Toggle Sign In / Sign Up tabs
  ["tabLogin","tabSignup"].forEach(id => document.getElementById(id)?.classList.remove("active"));
  if (mode === "login") document.getElementById("tabLogin")?.classList.add("active");
  else if (mode === "signup") document.getElementById("tabSignup")?.classList.add("active");
  // Show/hide teacher code field
  document.getElementById("teacherCodeGroup").style.display =
    (currentRole === "teacher" && mode === "signup") ? "flex" : "none";
  clearAlert();
};

window.toggleEye = function(inputId, btn) {
  const input = document.getElementById(inputId);
  const isPass = input.type === "password";
  input.type = isPass ? "text" : "password";
  btn.innerHTML = isPass
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
};

function showAlert(msg, type = "error") {
  const box = document.getElementById("alertBox");
  box.style.display = "block";
  box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}
function clearAlert() {
  const box = document.getElementById("alertBox");
  box.style.display = "none";
  box.innerHTML = "";
}
function setLoading(v) {
  document.getElementById("loadingOverlay").classList.toggle("show", v);
}

window.handleLogin = async function() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  if (!email || !password) { showAlert("Please fill in all fields."); return; }
  setLoading(true);
  try {
    // Sign in via Firebase Auth (gets us a token)
    const user = await loginUser(email, password);
    if (!user.emailVerified) {
      showAlert("Please verify your email first. Check your inbox.", "error");
      setLoading(false);
      return;
    }
    // Call backend for role check and pending user migration
    const data = await loginCheck();
    localStorage.setItem("userProfile", JSON.stringify(data));
    if (data.role !== currentRole) {
      showAlert(`This account is registered as a ${data.role}. Please select "${data.role}" above.`, "error");
      setLoading(false);
      return;
    }
    if (data.role === "teacher") window.location.href = "/teacher";
    else window.location.href = "/student";
  } catch(e) {
    showAlert(firebaseErrMsg(e));
    setLoading(false);
  }
};

window.handleSignup = async function() {
  const name     = document.getElementById("signupName").value.trim();
  const email    = document.getElementById("signupEmail").value.trim();
  const password = document.getElementById("signupPassword").value;
  if (!name || !email || !password) { showAlert("Please fill in all fields."); return; }
  if (password.length < 6) { showAlert("Password must be at least 6 characters."); return; }

  const teacherCode = currentRole === "teacher"
    ? document.getElementById("teacherCode").value.trim()
    : null;

  if (currentRole === "teacher" && !teacherCode) {
    showAlert("Please enter the Teacher Access Code."); return;
  }

  setLoading(true);
  try {
    // Backend validates teacher code, creates user, writes pendingUsers
    await signupUser(email, password, name, currentRole, teacherCode);
    // Sign in to send verification email (Firebase Auth requires signed-in user)
    try {
      await loginUser(email, password);
      await sendVerificationEmail();
    } catch(_) {} // Verification email is best-effort
    setMode("verify");
    setLoading(false);
  } catch(e) {
    showAlert(e.message || firebaseErrMsg(e));
    setLoading(false);
  }
};

window.handleReset = async function() {
  const email = document.getElementById("resetEmail").value.trim();
  if (!email) { showAlert("Please enter your email address."); return; }
  setLoading(true);
  try {
    await resetPassword(email);
    showAlert("Password reset link sent. Check your inbox.", "success");
    setLoading(false);
  } catch(e) {
    showAlert(firebaseErrMsg(e));
    setLoading(false);
  }
};

function firebaseErrMsg(e) {
  const code = e.code || "";
  if (code.includes("wrong-password") || code.includes("invalid-credential")) return "Incorrect email or password.";
  if (code.includes("user-not-found")) return "No account found with this email.";
  if (code.includes("too-many-requests")) return "Too many attempts. Please try again later.";
  if (code.includes("invalid-email")) return "Invalid email address.";
  if (code.includes("weak-password")) return "Password is too weak.";
  if (code.includes("network-request-failed")) return "Network error. Check your connection.";
  return e.message || "Something went wrong. Please try again.";
}
</script>
</body>
</html>
